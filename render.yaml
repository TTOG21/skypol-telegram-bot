services:
  - type: web
    name: skypol-telegram-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.kimi.com/coding/
      - key: LLM_MODEL
        value: kimi-k2-0711-preview
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
