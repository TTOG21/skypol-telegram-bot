services:
  - category: Fotografie & Videografie
    icon: 📸
    description: >
      Professionelle Portraits, Teamfotos, Image-Shootings, Event- und
      Firmenreportagen sowie emotionale Hochzeits-, Tauf- und
      Kommunionreportagen in Foto und Video.
    items:
      - Business & Portrait
      - Events & Firmenfeiern
      - Hochzeiten & Taufen
      - Image-Shootings

  - category: Gastronomie & Food
    icon: 🍽️
    description: >
      Restaurant- und Food-Shootings für Restaurants, Cafés und Bars. Wir setzen
      Lokale, Speisen und Drinks modern und appetitlich in Szene.
    items:
      - Restaurant-Shootings
      - Food-Fotografie
      - Menü- & Speisekarten
      - Social-Media-Content

  - category: Social Media Content & Reels
    icon: 📱
    description: >
      Kreative Reels, Stories und Posts inklusive Planung, Produktion und
      Bearbeitung – regelmäßig professionell präsent auf Instagram, Facebook & Co.
    items:
      - Reels & Stories
      - Content-Planung
      - Foto- & Videobearbeitung
      - Posting-Strategie

  - category: Google Business, Facebook & Instagram
    icon: 🌐
    description: >
      Wir bringen dein Business dorthin, wo deine Kund:innen sind: Auf Google,
      Facebook und Instagram – inklusive Profil-Einrichtung und Meta Business.
    items:
      - Google Business Profil
      - Social-Media-Betreuung
      - Meta Business Kampagnen
      - Einheitliches Branding

  - category: Webseiten & Online-Auftritt
    icon: 💻
    description: >
      Moderne, klare Webseiten mit passenden Texten, Bildern, Videos und Struktur
      – damit Kund:innen schnell verstehen, wer du bist und wie sie dich erreichen.
    items:
      - Responsive Webdesign
      - Text & Bildkonzept
      - SEO-Optimierung
      - Hosting-Beratung

  - category: Drucksachen, Karten, Speisekarten & Menüs
    icon: 🖨️
    description: >
      Visitenkarten, Flyer, Poster, Banner, Roll-Ups, Einladungs- und
      Dankeskarten, Speisekarten und Menüs – alles abgestimmt auf dein Branding.
    items:
      - Visitenkarten & Flyer
      - Poster & Banner
      - Einladungskarten
      - Speisekarten & Menüs

process:
  title: Von der Idee zum fertigen Produkt
  steps:
    - number: 01
      title: Kennenlernen
      description: Wir besprechen deine Wünsche, Ziele und Visionen.
    - number: 02
      title: Konzeption
      description: Wir entwickeln einen passenden Plan für Bilder, Content und Design.
    - number: 03
      title: Produktion
      description: Wir drehen, fotografieren, designen und erstellen alles Notwendige.
    - number: 04
      title: Auslieferung
      description: Du erhältst fertige Dateien, Online-Inhalte oder Drucksachen.

faq:
  - question: Wie lange dauert eine Buchung?
    answer: >
      Nach dem ersten Gespräch planen wir gemeinsam den Termin. Je nach Aufwand
      können wir oft innerhalb weniger Tage starten.
  - question: Welche Dateien erhalte ich?
    answer: >
      Du erhältst alle fertigen Bilder und Videos in Web- und Druckqualität,
      je nach Vereinbarung.
  - question: Fotografiert ihr auch außerhalb Deutschlands?
    answer: Gerne! Wir sind flexibel und begleiten Projekte auch im Ausland.
  - question: Wie läuft die Abrechnung ab?
    answer: >
      Nach der Anfrage erhältst du ein unverbindliches Angebot. Die Abrechnung
      erfolgt nach Vereinbarung.
  - question: Wie kann ich euch kontaktieren?
    answer: >
      Schreibe uns eine E-Mail an info@skypol.de oder rufe uns unter
      +49 176 8789 0032 an. Alternativ nutze das Kontaktformular auf unserer
      Webseite.

